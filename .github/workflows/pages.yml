name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Inject version from latest tag
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "dev")
          sed -i "s/__VERSION__/${VERSION}/g" docs/index.html

      - name: Publish installer entrypoints
        run: |
          cp install.sh docs/install.sh
          cp install-skill.sh docs/install-skill.sh
          mkdir -p docs/skill
          cp skill/SKILL.md docs/skill/SKILL.md
          cp skill/install.sh docs/skill/install.sh

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
