name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version label to display on the website"
        required: false
        type: string
        default: ""
      release_url:
        description: "GitHub release URL for the displayed version"
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      version:
        description: "Version label to display on the website"
        required: false
        type: string
        default: ""
      release_url:
        description: "GitHub release URL for the displayed version"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Prepare Pages artifact
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_RELEASE_URL: ${{ inputs.release_url }}
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="$REQUESTED_VERSION"
          if [[ -z "$version" ]]; then
            version="$(git describe --tags --abbrev=0 2>/dev/null || echo "dev")"
          fi

          release_url="$REQUESTED_RELEASE_URL"
          if [[ -z "$release_url" && "$version" != "dev" ]]; then
            release_url="$(gh release view "$version" --repo "$GITHUB_REPOSITORY" --json url --jq .url 2>/dev/null || true)"
          fi
          if [[ -z "$release_url" ]]; then
            release_url="https://github.com/$GITHUB_REPOSITORY/releases"
          fi

          scripts/prepare-pages.sh "$version" "$release_url"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
