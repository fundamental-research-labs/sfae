name: Publish npm Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to stage, with or without a leading v"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  stage:
    name: Stage npm package
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Use npm with stage support
        run: npm install -g npm@11.17.0

      - name: Resolve version
        id: version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          version="${INPUT_VERSION:-$RELEASE_TAG}"
          version="${version#v}"
          if [[ ! "$version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid npm semver version: $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check npm wrapper scripts
        run: npm run test:npm

      - name: Prepare package
        run: scripts/prepare-npm-package.sh "${{ steps.version.outputs.version }}"

      - name: Check package contents
        run: npm pack --dry-run "dist/v${{ steps.version.outputs.version }}/npm"

      - name: Check npm package state
        id: package
        shell: bash
        run: |
          package_name="$(node -p "require('./dist/v${{ steps.version.outputs.version }}/npm/package.json').name")"
          if ! npm view "$package_name" name >/dev/null 2>&1; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "$package_name does not exist on npm yet; publish the first version manually."
            exit 0
          fi

          echo "exists=true" >> "$GITHUB_OUTPUT"
          if npm view "$package_name@${{ steps.version.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "$package_name@${{ steps.version.outputs.version }} is already published"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage package on npm
        if: steps.package.outputs.exists == 'true' && steps.package.outputs.published != 'true'
        working-directory: dist/v${{ steps.version.outputs.version }}/npm
        run: npm stage publish
