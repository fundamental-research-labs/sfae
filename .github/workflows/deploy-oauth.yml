name: Deploy OAuth Service

on:
  push:
    branches: [main]
    paths:
      - "crates/sfae-oauth-server/**"
      - "Dockerfile.oauth"
      - "fly.oauth.toml"
      - ".github/workflows/deploy-oauth.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: oauth-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Sync runtime secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          DATABASE_URL: ${{ secrets.OAUTH_DATABASE_URL }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          OAUTH_GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
          OAUTH_GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
          SFAE_INTERNAL_AUTH_SECRET: ${{ secrets.SFAE_INTERNAL_AUTH_SECRET }}
          SFAE_OAUTH_TOKEN_ENCRYPTION_KEY: ${{ secrets.SFAE_OAUTH_TOKEN_ENCRYPTION_KEY }}
        run: |
          flyctl secrets set --stage \
            DATABASE_URL="$DATABASE_URL" \
            DISCORD_CLIENT_ID="$DISCORD_CLIENT_ID" \
            DISCORD_CLIENT_SECRET="$DISCORD_CLIENT_SECRET" \
            GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID" \
            GOOGLE_CLIENT_SECRET="$GOOGLE_CLIENT_SECRET" \
            GITHUB_CLIENT_ID="$OAUTH_GITHUB_CLIENT_ID" \
            GITHUB_CLIENT_SECRET="$OAUTH_GITHUB_CLIENT_SECRET" \
            SFAE_INTERNAL_AUTH_SECRET="$SFAE_INTERNAL_AUTH_SECRET" \
            SFAE_OAUTH_TOKEN_ENCRYPTION_KEY="$SFAE_OAUTH_TOKEN_ENCRYPTION_KEY" \
            --config fly.oauth.toml

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --config fly.oauth.toml
