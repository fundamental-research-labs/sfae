app = "sfae-oauth"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.oauth"

[env]
  ALLOWED_RETURN_ORIGINS = "https://oauth.sfae.io,https://sfae.io,https://app.sfae.io"
  BASE_URL = "https://oauth.sfae.io"
  RUST_LOG = "sfae_oauth_server=info,tower_http=info"
  SFAE_SERVER_PORT = "3100"

[http_service]
  internal_port = 3100
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
