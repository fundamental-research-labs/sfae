<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sfae — enter credential</title>
<style>
  {{BASE_STYLES}}
  .optional-hint {
    font-weight: 400;
    color: var(--text-tertiary);
    font-size: 0.9em;
  }
  input[data-m] { color: transparent; caret-color: var(--text); }
  .masked-input {
    position: relative;
  }
  .dots {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    padding: 10px 12px;
    font-size: 1em;
    font-family: inherit;
    line-height: 1.5;
    pointer-events: none;
    user-select: none;
    overflow: hidden;
    white-space: nowrap;
    color: var(--text);
  }
  #credential-form > button {
    margin-top: 16px;
  }
  .groups { margin-top: 4px; }
  .group-tabs {
    display: flex;
    align-items: stretch;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .group-tab {
    display: flex;
    flex: 1;
    margin-bottom: 0;
    cursor: pointer;
    border-right: 1px solid var(--border);
  }
  .group-tab:last-child { border-right: none; }
  .group-tab input[type="radio"] {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }
  .group-tab span {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 8px 12px;
    font-size: 0.9em;
    font-weight: 500;
    color: var(--text-secondary);
    text-align: center;
    background: var(--bg);
    transition: background 0.15s, color 0.15s;
  }
  .group-tab input[type="radio"]:checked + span {
    background: var(--text);
    color: var(--surface);
  }
  .oauth-content { padding: 4px 0; }
  .oauth-scope {
    font-size: 0.85em;
    color: var(--text-secondary);
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .oauth-scope code {
    font-size: 0.95em;
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 3px;
    word-break: break-all;
  }
  .oauth-btn {
    background: var(--link);
  }
  .oauth-btn:hover { background: #1557b0; }
  .oauth-status {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 0;
    font-size: 0.95em;
    color: var(--accent);
    font-weight: 500;
  }
  .oauth-status.error {
    color: var(--danger);
    padding: 8px 10px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><svg viewBox="0 0 48 48" fill="none"><rect x="12" y="20" width="24" height="20" rx="3" stroke="currentColor" stroke-width="2.5"/><path d="M18 20V14a6 6 0 1 1 12 0v6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><circle cx="24" cy="31" r="2.5" fill="currentColor"/><line x1="24" y1="33.5" x2="24" y2="37" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>sfae</div>
  <h1>{{LABEL}}</h1>
  {{URL_SECTION}}
  <div id="credential-form">
    {{FIELDS}}
    {{GROUPS}}
    {{SUBMIT_BUTTON}}
  </div>
  <p class="footer-note">SFAE stores credentials in your secret manager. Agents can never see them.</p>
</div>
<a class="site-mark" href="https://sfae.io" target="_blank" rel="noreferrer">sfae.io</a>
<script>
{{BASE_SCRIPT}}
// Dot overlay for masked fields. The real value stays in input.value.
document.querySelectorAll('input[data-m]').forEach(function(el){
  var d=el.nextElementSibling;
  if(!d)return;
  function update(){
    d.textContent='\u2022'.repeat(el.value.length);
    d.style.textIndent=el.scrollLeft ? '-' + el.scrollLeft + 'px' : '0';
  }
  function updateSoon(){
    update();
    requestAnimationFrame(update);
  }
  updateSoon();
  el.addEventListener('input',updateSoon);
  el.addEventListener('scroll',update);
  el.addEventListener('click',updateSoon);
  el.addEventListener('keyup',updateSoon);
});
sfaeWireSubmitState(document.getElementById('credential-form'));
function sfaeSubmit(){
  var c=document.getElementById('credential-form');
  if(!c)return;
  var inputs=c.querySelectorAll('input:not(:disabled)');
  var body=new URLSearchParams();
  inputs.forEach(function(i){
    if(!i.name)return;
    if(i.type==='radio'&&!i.checked)return;
    body.append(i.name,i.value);
  });
  var missing=sfaeMissingInputs(c);
  if(missing.length){sfaeFlashMissing(missing);missing[0].focus();sfaeUpdateSubmitState(c);return}
  fetch('/',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body})
  .then(function(r){return r.text()})
  .then(sfaeReplaceDocument)
}
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&e.target.tagName==='INPUT')sfaeSubmit();
});
</script>
</body>
</html>
