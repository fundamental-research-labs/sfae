<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sfae — enter credential</title>
<style>
  {{BASE_STYLES}}
  .logo {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.85em;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: 24px;
  }
  .logo svg {
    width: 1.2em;
    height: 1.2em;
  }
  h1 {
    font-size: 1.25em;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 16px;
  }
  .url-hint {
    font-size: 0.9em;
    color: var(--text-secondary);
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .url-hint a {
    color: var(--link);
    text-decoration: none;
    word-break: break-all;
  }
  .url-hint a:hover {
    text-decoration: underline;
  }
  .field { margin-bottom: 14px; }
  .optional-hint {
    font-weight: 400;
    color: var(--text-tertiary);
    font-size: 0.9em;
  }
  label {
    display: block;
    font-size: 0.85em;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  input[type="password"],
  input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 1em;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="password"]:focus,
  input[type="text"]:focus {
    border-color: var(--link);
    box-shadow: 0 0 0 3px var(--focus-ring);
  }
  button, .oauth-btn {
    display: block;
    width: 100%;
    padding: 10px;
    font-size: 1em;
    font-weight: 500;
    font-family: inherit;
    color: var(--surface);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    transition: background 0.15s;
  }
  button {
    margin-top: 16px;
    background: var(--text);
  }
  button:hover {
    background: #333;
  }
  button:active {
    background: #000;
  }
  .groups { margin-top: 4px; }
  .group-tabs {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .group-tab {
    flex: 1;
    margin-bottom: 0;
    cursor: pointer;
  }
  .group-tab input[type="radio"] {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }
  .group-tab span {
    display: block;
    padding: 8px 12px;
    font-size: 0.9em;
    font-weight: 500;
    color: var(--text-secondary);
    text-align: center;
    background: var(--bg);
    transition: background 0.15s, color 0.15s;
    border-right: 1px solid var(--border);
  }
  .group-tab:last-child span {
    border-right: none;
  }
  .group-tab input[type="radio"]:checked + span {
    background: var(--text);
    color: var(--surface);
  }
  .oauth-content { padding: 4px 0; }
  .oauth-scope {
    font-size: 0.85em;
    color: var(--text-secondary);
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .oauth-scope code {
    font-size: 0.95em;
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 3px;
    word-break: break-all;
  }
  .oauth-btn {
    background: var(--link);
  }
  .oauth-btn:hover { background: #1557b0; }
  .oauth-status {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 0;
    font-size: 0.95em;
    color: var(--accent);
    font-weight: 500;
  }
  .footer-note {
    font-size: 0.78em;
    color: var(--text-tertiary);
    margin-top: 16px;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><svg viewBox="0 0 48 48" fill="none"><rect x="12" y="20" width="24" height="20" rx="3" stroke="currentColor" stroke-width="2.5"/><path d="M18 20V14a6 6 0 1 1 12 0v6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><circle cx="24" cy="31" r="2.5" fill="currentColor"/><line x1="24" y1="33.5" x2="24" y2="37" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>sfae</div>
  <h1>{{LABEL}}</h1>
  {{URL_SECTION}}
  <form method="POST" action="/" autocomplete="off">
    {{FIELDS}}
    {{GROUPS}}
    {{SUBMIT_BUTTON}}
  </form>
  <p class="footer-note">Your secret is stored in the OS keychain and injected into requests at runtime. The agent never sees or has access to it.</p>
</div>
<script>
(function(){
  var form=document.querySelector('form');
  if(!form)return;
  form.addEventListener('submit',function(e){
    e.preventDefault();
    var body=new URLSearchParams(new FormData(form));
    fetch('/',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body})
    .then(function(r){return r.text()})
    .then(function(html){document.open();document.write(html);document.close()})
    .catch(function(){form.submit()})
  });
})();
</script>
</body>
</html>
