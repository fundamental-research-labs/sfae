<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sfae — enter credential</title>
<style>
  {{BASE_STYLES}}
  .logo {
    font-size: 0.85em;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 24px;
  }
  h1 {
    font-size: 1.25em;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 16px;
  }
  .url-hint {
    font-size: 0.9em;
    color: #555;
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .url-hint a {
    color: #1a73e8;
    text-decoration: none;
    word-break: break-all;
  }
  .url-hint a:hover {
    text-decoration: underline;
  }
  .field { margin-bottom: 14px; }
  label {
    display: block;
    font-size: 0.85em;
    font-weight: 500;
    color: #555;
    margin-bottom: 6px;
  }
  input[type="password"],
  input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d0d0d0;
    border-radius: 6px;
    font-size: 1em;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="password"]:focus,
  input[type="text"]:focus {
    border-color: #1a73e8;
    box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
  }
  button {
    margin-top: 16px;
    width: 100%;
    padding: 10px;
    font-size: 1em;
    font-weight: 500;
    font-family: inherit;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover {
    background: #333;
  }
  button:active {
    background: #000;
  }
  .groups { margin-top: 4px; }
  .group-tabs {
    display: flex;
    border: 1px solid #d0d0d0;
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .group-tab {
    flex: 1;
    margin-bottom: 0;
    cursor: pointer;
  }
  .group-tab input[type="radio"] {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }
  .group-tab span {
    display: block;
    padding: 8px 12px;
    font-size: 0.9em;
    font-weight: 500;
    color: #555;
    text-align: center;
    background: #fafafa;
    transition: background 0.15s, color 0.15s;
    border-right: 1px solid #d0d0d0;
  }
  .group-tab:last-child span {
    border-right: none;
  }
  .group-tab input[type="radio"]:checked + span {
    background: #1a1a1a;
    color: #fff;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">sfae</div>
  <h1>{{LABEL}}</h1>
  {{URL_SECTION}}
  <form method="POST" action="/">
    {{FIELDS}}
    {{GROUPS}}
    <button type="submit">Submit</button>
  </form>
  <p style="font-size:0.78em;color:#888;margin-top:16px;line-height:1.5;">Your secret is stored in the OS keychain and injected into requests at runtime. The agent never sees or has access to it.</p>
</div>
</body>
</html>
